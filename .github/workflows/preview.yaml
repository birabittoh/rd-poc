name: Preview Deploy

on:
  push:
    branches-ignore: [main]
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build -- --base /

      - name: Compute preview URL
        id: slug
        run: |
          HASH=$(echo -n "${{ github.repository }}:${{ github.ref_name }}" | sha256sum | awk '{print $1}')
          UUID="${HASH:0:8}-${HASH:8:4}-${HASH:12:4}-${HASH:16:4}-${HASH:20:12}"
          echo "url=https://${UUID}.surge.sh" >> "$GITHUB_OUTPUT"

      - name: Deploy to surge.sh
        run: npx surge dist "${{ steps.slug.outputs.url }}" --token "${{ secrets.SURGE_TOKEN }}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
              state: 'open',
            });
            if (prs.length === 0) return;
            const pr = prs[0];
            const marker = '<!-- preview-deploy -->';
            const body = `${marker}\n**Preview:** ${{ steps.slug.outputs.url }}\n_Updated on push to \`${{ github.ref_name }}\` — ${context.sha.slice(0, 7)}_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

  teardown-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Compute preview URL
        id: slug
        run: |
          HASH=$(echo -n "${{ github.repository }}:${{ github.head_ref }}" | sha256sum | awk '{print $1}')
          UUID="${HASH:0:8}-${HASH:8:4}-${HASH:12:4}-${HASH:16:4}-${HASH:20:12}"
          echo "url=${UUID}.surge.sh" >> "$GITHUB_OUTPUT"

      - name: Teardown surge.sh preview
        run: npx surge teardown "${{ steps.slug.outputs.url }}" --token "${{ secrets.SURGE_TOKEN }}"
